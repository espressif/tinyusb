# This workflow builds and runs ESP-USB test applications for pull requests.
# It checks out the latest code from ESP-USB master, builds test apps using Espressif's IDF,
# uploads artifacts, and runs tests on self-hosted runners for supported targets.

name: ESP-USB Test Apps [master]

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Cancel previous runs of this workflow for the same PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        idf_ver: ["release-v5.2", "release-v5.3", "release-v5.4", "release-v5.5", "release-v6.0", "latest"]
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}
    permissions:
      pull-requests: read
    env:
      IDF_BUILD_APPS_VER: "2.13.3"
      # We are cloning esp-usb repo to get the test apps to build, the paths should be configured explicitly
      ESP_USB_PATH: esp-usb
      ESP_TINYUSB_TEST_APPS: esp-usb/device/esp_tinyusb/test_apps
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'true'
      - name: Clone esp-usb repository
        run: |
            git clone https://github.com/espressif/esp-usb.git || {
              echo "git clone of esp-usb repository failed"
              exit 1
            }
      - name: Build
        shell: bash
        run: |

          . ${IDF_PATH}/export.sh
          pip install --no-cache-dir idf-build-apps==${{ env.IDF_BUILD_APPS_VER }} pyyaml --upgrade
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"
          python .github/ci/override_managed_component.py tinyusb . ${{ env.ESP_TINYUSB_TEST_APPS }}/*/

          # Config and manifest files for idf-build-apps are used from the esp-usb repository automatically
          # Here we only overload path using CLI parameter -p to build only device test apps
          cd ${{ env.ESP_USB_PATH }}
          idf-build-apps find -p device --disable-targets esp32s31
          idf-build-apps build -p device --disable-targets esp32s31
      - uses: actions/upload-artifact@v6
        with:
          # Test apps builds live under the repository workspace, we use workspace-relative glob
          name: usb_device_test_app_bin_${{ matrix.idf_ver }}
          path: |
            **/build_esp*/bootloader/bootloader.bin
            **/build_esp*/partition_table/partition-table.bin
            **/build_esp*/test_app_*.bin
            **/build_esp*/test_app_*.elf
            **/build_esp*/flasher_args.json
            **/build_esp*/config/sdkconfig.json
          if-no-files-found: error

  run-target:
    name: Run
    # Disable the job in forks
    if: ${{ github.repository_owner == 'espressif' }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        idf_ver: ["release-v5.2", "release-v5.3", "release-v5.4", "release-v5.5", "release-v6.0", "latest"]
        idf_target: ["esp32s2", "esp32p4"]
        sdkconfig: ["default"]
        runner_tag: ["usb_device"]
        eco_ver: ["eco_default", "eco4"]
        exclude:
          # Exclude esp32p4 for releases before IDF 5.3 for all runner tags (esp32p4 support starts in IDF 5.3)
          - idf_ver: "release-v5.2"
            idf_target: "esp32p4"
          # Exclude eco4 version for esp32s2
          - idf_target: "esp32s2"
            eco_ver: "eco4"
          # esp32p4 ECO6 support starts in IDF 5.5
          - idf_target: "esp32p4"
            eco_ver: "eco_default"
            idf_ver: "release-v5.4"
          - idf_target: "esp32p4"
            eco_ver: "eco_default"
            idf_ver: "release-v5.3"
    runs-on: [self-hosted, linux, docker, "${{ matrix.idf_target }}", "${{ matrix.runner_tag }}", "${{ matrix.eco_ver }}"]
    container:
      image: python:3.11-bookworm
      options: --privileged --device-cgroup-rule="c 188:* rmw" --device-cgroup-rule="c 166:* rmw"
      volumes:
        - /dev/bus/usb:/dev/bus/usb
    env:
      ESP_USB_ROOT: esp-usb
      ESP_USB_TEST_APPS_PATH: esp-usb/device/esp_tinyusb/test_apps
    steps:
      - uses: actions/checkout@v5
      - name: Clone esp-usb repository
        run: |
          git clone https://github.com/espressif/esp-usb.git
      - name: ⚙️ Install System tools
        run: |
          apt update
          apt install -y usbutils
      - name: Install Python packages
        env:
          PIP_EXTRA_INDEX_URL: "https://dl.espressif.com/pypi/"
        run: pip install --only-binary cryptography pytest-embedded pytest-embedded-serial-esp pytest-embedded-idf pyserial pyusb pytest-rerunfailures idf-ci
      - uses: actions/download-artifact@v7
        with:
          # No need to set the path manually.
          # The test apps were built after cloning the esp-usb repo,
          # and the build artifacts already have the correct folder structure.
          name: usb_device_test_app_bin_${{ matrix.idf_ver }}
      - name: Run on target
        run: |

          # Set runner marker argument
          MARKER_ARG="-m=${{ matrix.runner_tag }}"

          if [ "${{ matrix.idf_target }}" = "esp32p4" ]; then
            if [ "${{ matrix.eco_ver }}" = "eco_default" ]; then
              MARKER_ARG="$MARKER_ARG and ${{ matrix.eco_ver }}"
            else
              MARKER_ARG="$MARKER_ARG and ${{ matrix.idf_target }}_${{ matrix.eco_ver }}"
            fi
          fi

          echo "Running pytest with marker: $MARKER_ARG"
          pytest ${{ env.ESP_USB_TEST_APPS_PATH }} --target=${{ matrix.idf_target }} "$MARKER_ARG" --build-dir=build_${{ matrix.idf_target }}_
